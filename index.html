<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    <title>Récit interactif</title>
</head>
<body>
    <aside class="aside-bar">
        <div class="tips">
            <h2>Aide et indice</h2>
            <div class="tips-content"></div>
        </div>

        <div class="acte">
            <h2>Actes</h2>
            <button>Acte I</button>
            <button>Acte II</button>
            <button>Acte III</button>
        </div>
        <div class="aside-log">
            <h2>Logs</h2>
            <ul></ul>
        </div>
    </aside>
    <aside class="aside-main">
        <header>
            <h1>Void Terminal</h1>
            <p>Copyright (C) Void Corporation. Tous droits réservés.</p>
            <p>Installez la dernière version du Terminal pour de nouvelles fonctionnalités et améliorations de sécurité !</p>
        </header>
        <main>
            <div class="page_terminal">
                <section class="fenetre_terminal" aria-label="Terminal narratif">
                    <header class="header_terminal">
                        <p class="titre_terminal">Terminal numérique inconnu - BD Narrative Host</p>
                    </header>
                    <div class="corps_terminal" id="terminalBody" role="log" aria-live="polite">
                        <label class="ligne ligne_commande" id="inputLine" for="commandInput">
                            <span class="invite_terminal">PS C:\Users\???\???&gt;</span>
                            <input id="commandInput" type="text" autocomplete="off" spellcheck="false" placeholder="Tape next puis Entree">
                        </label>
                    </div>
                </section>
            </div>
        </main>
        <footer>
            <p id="footer-text"></p>
        </footer>
    </aside>
    <script type="module" src="assets/main.js"></script>
    <script>
        const text = "Réalisé par SOM DE ARAUJO Charlotte / RICHAND Enzo / VERZELETTI Maxime / DELOUSTAL YOAN / LAURENT Etan";
        const p = document.getElementById("footer-text");
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
            p.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 40);
            }
        }

        window.addEventListener("load", typeWriter);
    </script>
</body>
</html>
